# Free hosting at https://<owner>.github.io/<repo>/ (or https://<user>.github.io/ for a user site repo).
# Matches GitHub’s Pages guidance: do not cancel in-flight deploys; use configure-pages for BASE_PATH.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: npm ci --legacy-peer-deps && npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          GITHUB_PAGES: '1'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
