# Free hosting at https://<owner>.github.io/<repo>/ (or https://<user>.github.io/ for a user site repo).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Compute BASE_PATH for Vite
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "$OWNER.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        run: npm ci --legacy-peer-deps && npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
          GITHUB_PAGES: '1'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
